# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/programs.conf
source = ~/.config/hypr/workspaces.conf

plugin:hyprglass {
    default_theme = dark
    default_preset = default

    brightness = 0.9                 # global override
    dark:brightness = 0.82           # built-in dark theme override
    light:adaptive_boost = 0.5       # built-in light theme override

    # Custom preset: shared + per-theme variants
    preset = name:clear, glass_opacity:0.8, blur_strength:1.5
    preset = name:clear:dark, brightness:0.7
    preset = name:clear:light, brightness:1.2
}

################
### MONITORS ###
################
monitor=,2880x1920@120,auto, 1.6
# monitor=,2880x1920@120,auto, 1
# monitor=,2160x1440@40,auto, 1.25

# for fractional scaling issues
xwayland {
  force_zero_scaling = true
}

env = GDK_SCALE, 2
env = XCURSOR_SIZE,32

#################
### AUTOSTART ###
#################

exec-once = $waybar 
exec-once = $wallpaper


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $primary $tertiary 45deg
  
    col.inactive_border = $on_primary_fixed

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    # inactive_opacity = 0.90
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 3

	      new_optimizations = true
	      ignore_opacity = true

	      noise = 0.2
	      contrast = 1.01
        # vibrancy = 0.1696
        vibrancy = 0.1
        # vibrancy = 0.1
	      vibrancy_darkness = 1
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    # animation = workspaces, noanim
    animation = workspaces, 1, 0.4, easeOutQuint, slide
    # animation = workspacesIn, 1, 1.21, almostLinear, fade
    # animation = workspacesOut, 1, 1.94, almostLinear, fade
}


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    focus_on_activate = true
    vfr = true
    vrr = 1
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.2 # -1.0 - 1.0, 0 means no modification.

    accel_profile = flat

    touchpad {
        natural_scroll = true
    }

    # Keyboard key repeat
    repeat_delay = 200
    repeat_rate = 40
}

# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = at-translated-set-2-keyboard
    kb_options = caps:swapescape
}

device {
  name = razer-razer-viper-v3-hyperspeed-mouse
  accel_profile = linear
}

device {
    name = pixa3854:00-093a:0274-touchpad
    accel_profile = adaptive
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

windowrule {
  name = windowrule-3
  opacity = 0.85 override 0.85 override
  match:class = ^(Spotify)$
}

layerrule {
  name = layerrule-4
  blur = on
  ignore_alpha = 0.2
  match:namespace = wofi
}

layerrule {
  name = layerrule-5
  no_anim = on
  match:namespace = hyprpaper
}

layerrule {
  name = layerrule-6
  animation = slide top
  blur = on
  blur_popups = on
  ignore_alpha = 0.2
  match:namespace = waybar
}
